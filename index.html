<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống quản lý dữ liệu và tra cứu công thức chế biến dành cho sinh viên</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #ffffff; color: #333; }
        
        /* Banner Header */
        header { 
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), 
                        url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=1600') no-repeat center center; 
            background-size: cover; 
            color: white; 
            text-align: center; 
            padding: 5rem 1rem; 
        }
        header h1 { font-size: 1.7rem; font-weight: normal; letter-spacing: 0.5px; line-height: 1.4; }
        
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        
        /* Bộ nút lọc */
        .filter-buttons { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
        .btn-filter { padding: 0.4rem 1.2rem; border: 1px solid #ced4da; background-color: white; border-radius: 4px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; display: flex; align-items: center; gap: 0.3rem; }
        
        .btn-filter[data-target="all"] { background-color: #dc3545; color: white; border-color: #dc3545; }
        .btn-filter[data-target="bac"] { color: #0d6efd; border-color: #0d6efd; }
        .btn-filter[data-target="trung"] { color: #ffc107; border-color: #ffc107; }
        .btn-filter[data-target="nam"] { color: #198754; border-color: #198754; }
        
        .btn-filter:hover, .btn-filter.active { opacity: 0.85; }
        .btn-filter[data-target="all"].active { background-color: #bd2130; }
        .btn-filter[data-target="bac"].active { background-color: #0d6efd; color: white; }
        .btn-filter[data-target="trung"].active { background-color: #ffc107; color: white; }
        .btn-filter[data-target="nam"].active { background-color: #198754; color: white; }

        /* Lưới hiển thị 3 cột */
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .food-card { background: white; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; flex-direction: column; border: 1px solid #e0e0e0; transition: transform 0.2s; }
        .food-card:hover { transform: translateY(-3px); }
        
        .food-img-wrapper { width: 100%; height: 210px; overflow: hidden; background-color: #f8f9fa; }
        .food-img { width: 100%; height: 100%; object-fit: cover; }
        
        .food-info { padding: 1.25rem; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .food-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 0.2rem; color: #000; }
        
        .food-location { font-size: 0.85rem; color: #dc3545; font-weight: bold; margin-bottom: 0.75rem; }
        .food-desc { font-size: 0.9rem; color: #6c757d; margin-bottom: 1.5rem; line-height: 1.5; text-align: justify; }
        
        /* Nút Xem Công Thức thanh mảnh viền đỏ */
        .btn-recipe { width: 100%; padding: 0.5rem; background-color: white; color: #dc3545; border: 1px solid #dc3545; border-radius: 4px; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; text-align: center; font-weight: 500; }
        .btn-recipe:hover { background-color: #dc3545; color: white; }

        /* --- HỘP THOẠI CÔNG THỨC (MODAL TỰ CHẾ KHÔNG LỖI) --- */
        .custom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.3s ease; }
        .custom-overlay.active { opacity: 1; pointer-events: auto; }
        
        .custom-modal { background: white; width: 90%; max-width: 700px; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); transform: translateY(-50px); transition: all 0.3s ease; }
        .custom-overlay.active .custom-modal { transform: translateY(0); }
        
        .modal-title-bar { background: #dc3545; color: white; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .modal-title-bar h3 { font-size: 1.3rem; font-weight: bold; }
        .close-modal-btn { background: none; border: none; color: white; font-size: 1.7rem; cursor: pointer; line-height: 1; }
        
        .modal-content-body { padding: 1.5rem; max-height: 75vh; overflow-y: auto; }
        .recipe-section { color: #dc3545; font-weight: bold; margin-top: 1.2rem; margin-bottom: 0.6rem; border-left: 4px solid #dc3545; padding-left: 10px; font-size: 1.1rem; }
        .recipe-list { padding-left: 22px; font-size: 0.95rem; line-height: 1.6; color: #444; }
        .recipe-list li { margin-bottom: 0.4rem; }
    </style>
</head>
<body>

    <header>
        <h1>Hệ thống quản lý dữ liệu và tra cứu công thức chế biến dành cho sinh viên</h1>
    </header>

    <div class="container">
        <div class="filter-buttons">
            <button class="btn-filter active" data-target="all" onclick="filterFood('all')">Tất Cả Đặc Sản</button>
            <button class="btn-filter" data-target="bac" onclick="filterFood('bac')">🍜 Miền Bắc</button>
            <button class="btn-filter" data-target="trung" onclick="filterFood('trung')">🌶️ Miền Trung</button>
            <button class="btn-filter" data-target="nam" onclick="filterFood('nam')">🥥 Miền Nam</button>
        </div>

        <div class="food-grid" id="foodContainer">
